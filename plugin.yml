name: geomaptools
main: de.cndrbrbr.mc.geomaptools
author: cndrbrbr
description: Geographic map import, image import, and quick building tools
version: 4.36
api-version: '1.21'
commands:
    ghelp:
        description: Show help for all geomaptools commands
        usage: /<command> [command]
        permission: geomaptools.basic
        permission-message: You don't have <permission>
    goff:
        description: Turn off the active geomaptools command
        usage: /<command>
        permission: geomaptools.basic
        permission-message: You don't have <permission>
    gspur:
        description: Leave a trail of blocks beneath you as you walk
        usage: /<command> [material] [height]
        permission: geomaptools.basic
        permission-message: You don't have <permission>
    gquad:
        description: Place a rectangular block structure in the direction you face
        usage: /<command> [material] [width] [height] [depth]
        permission: geomaptools.basic
        permission-message: You don't have <permission>
    gforward:
        description: Build a wall straight ahead from the next block you place
        usage: /<command> [material] [length] [height]
        permission: geomaptools.basic
        permission-message: You don't have <permission>
    gOSMOverpass:
        description: Import a real-world map from OpenStreetMap at your location
        usage: /<command> [size in meters]
        permission: geomaptools.basic
        permission-message: You don't have <permission>
    gspawnColorSheeps:
        description: Spawn colored sheep at your location
        usage: /<command> [count] [color|all]
        permission: geomaptools.basic
        permission-message: You don't have <permission>
    gmap:
        description: Place an image as blocks at the next block you place
        usage: /<command> [filename.PNG] [ground:true|false]
        permission: geomaptools.advanced
        permission-message: You don't have <permission>
    glist:
        description: List all available image files
        usage: /<command>
        permission: geomaptools.advanced
        permission-message: You don't have <permission>
    gload:
        description: Load an image from URL
        usage: /<command>
        permission: geomaptools.advanced
        permission-message: You don't have <permission>
    gdelete:
        description: Delete all connected blocks of the same material within radius
        usage: /<command> [radius]
        permission: geomaptools.advanced
        permission-message: You don't have <permission>
    gbuildalong:
        description: Build walls on top of all connected blocks of the same material
        usage: /<command> [radius] [height]
        permission: geomaptools.advanced
        permission-message: You don't have <permission>
